<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="calculator.css">
    <script src="calculator.js" defer></script>
</head>
<body>
    <main id="main_calculator_container">
        <div id="display_button">248</div>
        <div class="calculator_container_items symbol_button" id="clear_button">C</div>
        <div class="calculator_container_items symbol_button" id="percentage_button">%</div>
        <div class="calculator_container_items symbol_button" id="equals_button">=</div>
        <div class="calculator_container_items symbol_button" id="plus_button">+</div>
        <div class="calculator_container_items"  id="one_button">1</div>
        <div class="calculator_container_items" id="two_button">2</div>
        <div class="calculator_container_items" id="three_button">3</div>
        <div class="calculator_container_items symbol_button" id="minus_button">-</div>
        <div class="calculator_container_items" id="four_button">4</div>
        <div class="calculator_container_items" id="five_button" >5</div>
        <div class="calculator_container_items" id="six_button">6</div>
        <div class="calculator_container_items symbol_button" id="multiply_button">x</div>
        <div class="calculator_container_items" id="seven_button">7</div>
        <div class="calculator_container_items" id="eight_button">8</div>
        <div class="calculator_container_items"  id="nine_button">9</div>
        <div class="calculator_container_items symbol_button" id="division_button">/</div>
        <div class="calculator_container_items" id="zero_button">0</div>
        <div class="calculator_container_items" id="decimal_button color_changes">.</div>
    </main>
</body>
</html>
